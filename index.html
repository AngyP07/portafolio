<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --surface: #101010;
      --surface-muted: #1a1a1a;
      --text: #f5f5f5;
      --text-soft: #b9b9b9;
      --border: #2a2a2a;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 35%),
        linear-gradient(180deg, #111111 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      width: min(100% - 2rem, 1100px);
      margin: 0 auto;
      padding: 1.5rem 0 4rem;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      background: rgba(16, 16, 16, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .brand,
    .brand a {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .nav-links a {
      padding: 0.7rem 1rem;
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
      background: var(--surface-muted);
      transform: translateY(-1px);
      outline: none;
    }

    .hero {
      padding: 5.5rem 0 3rem;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .hero p {
      max-width: 38rem;
      margin: 1rem 0 0;
      color: var(--text-soft);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .content-card {
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      background: rgba(16, 16, 16, 0.96);
      box-shadow: var(--shadow);
    }

    .content-card h2 {
      margin: 0 0 1.5rem;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
    }

    .task-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, #161616 0%, #0d0d0d 100%);
      color: var(--text);
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .task-link:hover,
    .task-link:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(31, 29, 26, 0.08);
      border-color: #4a4a4a;
      outline: none;
    }

    .task-label {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .task-meta {
      color: var(--text-soft);
      font-size: 0.95rem;
    }

    .task-arrow {
      font-size: 1.4rem;
      color: var(--text-soft);
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 1rem, 1100px);
        padding-top: 1rem;
      }

      .nav {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero {
        padding: 4rem 0 2.5rem;
      }

      .content-card {
        padding: 1.5rem;
      }

      .task-link {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav" aria-label="Primary navigation">
      <div class="brand"><a href="index.html">Menu</a></div>
      <div class="nav-links">
        <a href="Tareas.html">Tareas</a>
        <a href="#ejercicios">Ejercicios</a>
      </div>
    </nav>

    <header class="hero">
      <h1>Data</h1>
      <p>
        Una portada simple y moderna para organizar tus actividades con una apariencia oscura y limpia.
      </p>
    </header>

    <main>
      <section class="content-card" id="tareas">
        <h2>Tarea 1</h2>
        <a class="task-link" href="Tarea1.html">
          <span>
            <span class="task-label">Abrir Tarea1.html</span>
            <span class="task-meta">Accede a la primera tarea desde esta pagina.</span>
          </span>
          <span class="task-arrow" aria-hidden="true">&rarr;</span>
        </a>
      </section>

      <section id="ejercicios" aria-label="Ejercicios"></section>
    </main>
  </div>
</body>
</html>
